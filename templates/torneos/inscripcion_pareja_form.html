{% extends 'layout.html' %}

{% block title %}Apuntarse con pareja — {{ torneo.nombre }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="card-title"><i class="bi bi-people"></i> Apuntarse con pareja</h3>
        <p class="text-muted">{{ torneo.nombre }}</p>
        <hr>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="{{ form.pareja.id_for_label }}" class="form-label">{{ form.pareja.label }}</label>
            {{ form.pareja }}
            {% if form.pareja.errors %}
              <div class="text-danger small">{{ form.pareja.errors }}</div>
            {% endif %}
          </div>
          <div class="d-flex justify-content-between">
            <a href="{% url 'torneo_detail' torneo.pk %}" class="btn btn-outline-secondary">Cancelar</a>
            <button type="submit" class="btn btn-success">Confirmar inscripción</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

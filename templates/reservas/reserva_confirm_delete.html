{% extends 'layout.html' %}

{% block title %}Eliminar reserva{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-danger">
      <div class="card-body text-center">
        <h4 class="card-title text-danger">¿Eliminar reserva?</h4>
        <p>Esta acción no se puede deshacer.</p>
        <p class="fw-bold">{{ object.pista }} — {{ object.fecha|date:"d/m/Y" }} {{ object.hora_inicio|date:"H:i" }}</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex justify-content-center gap-2">
            <a href="{% url 'reserva_list' %}" class="btn btn-outline-secondary">Cancelar</a>
            <button type="submit" class="btn btn-danger">Eliminar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
